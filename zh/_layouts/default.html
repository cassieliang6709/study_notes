<!DOCTYPE html>
<html lang="zh" class="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <header id="topbar">
      <div class="topbar-left">
        <button id="sidebar-toggle" class="icon-btn" title="切换侧栏" aria-label="切换侧栏">
          <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
        </button>
        <a class="topbar-logo" href="{{ '/' | relative_url }}">
          <span class="logo-icon"></span>
          <span>{{ site.title }}</span>
        </a>
      </div>
      <div class="topbar-right">
        <button id="theme-toggle" class="icon-btn" title="切换主题" aria-label="切换主题">
          <svg class="icon-sun" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/></svg>
          <svg class="icon-moon" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
        </button>
        <a href="https://github.com/cassieliang6709/study_notes" class="icon-btn" title="GitHub" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 .5C5.37.5 0 5.78 0 12.292c0 5.188 3.438 9.586 8.205 11.137.6.111.82-.254.82-.567 0-.28-.01-1.022-.015-2.005-3.338.711-4.042-1.582-4.042-1.582-.546-1.361-1.335-1.725-1.335-1.725-1.087-.731.084-.716.084-.716 1.205.082 1.838 1.215 1.838 1.215 1.07 1.803 2.809 1.282 3.495.981.108-.763.417-1.282.76-1.577-2.665-.295-5.466-1.309-5.466-5.827 0-1.287.465-2.339 1.235-3.164-.135-.298-.54-1.497.105-3.121 0 0 1.005-.316 3.3 1.209.96-.262 1.98-.392 3-.398 1.02.006 2.04.136 3 .398 2.28-1.525 3.285-1.209 3.285-1.209.645 1.624.24 2.823.12 3.121.765.825 1.23 1.877 1.23 3.164 0 4.53-2.805 5.527-5.475 5.817.42.354.81 1.077.81 2.182 0 1.578-.015 2.846-.015 3.229 0 .309.21.678.825.56C20.565 21.875 24 17.477 24 12.292 24 5.78 18.627.5 12 .5z"/></svg>
        </a>
      </div>
    </header>

    <div id="app">
      <div id="sidebar-backdrop" hidden></div>

      <nav id="sidebar" aria-label="站点导航">
        <div class="sidebar-inner">
          <div class="sidebar-brand">
            <span class="brand-dot"></span>
            <span class="brand-name">梁玥</span>
          </div>
          <ol class="chapter-list">
            <li class="chapter-item {% if page.url == '/' %}active{% endif %}">
              <a href="{{ '/' | relative_url }}"><span class="ch-icon">⌂</span>首页</a>
            </li>

            <li class="part-title">作品集</li>
            <li class="chapter-item {% if page.url contains '/projects/' %}active{% endif %}">
              <a href="{{ '/projects/' | relative_url }}"><span class="ch-icon">◈</span>项目</a>
            </li>
            <li class="chapter-item {% if page.url contains '/resume/' %}active{% endif %}">
              <a href="{{ '/resume/' | relative_url }}"><span class="ch-icon">◈</span>简历</a>
            </li>

            <li class="part-title">面试准备</li>
            <li class="chapter-item {% if page.url contains '/algorithms/' %}active{% endif %}">
              <a href="{{ '/algorithms/' | relative_url }}"><span class="ch-icon">◈</span>算法</a>
            </li>
            <li class="chapter-item {% if page.url contains '/bq_prep/' %}active{% endif %}">
              <a href="{{ '/bq_prep/' | relative_url }}"><span class="ch-icon">◈</span>行为面试</a>
            </li>

            <li class="part-title">基础知识</li>
            <li class="chapter-item {% if page.url contains '/ood/' %}active{% endif %}">
              <a href="{{ '/ood/' | relative_url }}"><span class="ch-icon">◈</span>面向对象设计</a>
            </li>
            <li class="chapter-item {% if page.url contains '/python/' %}active{% endif %}">
              <a href="{{ '/python/' | relative_url }}"><span class="ch-icon">◈</span>Python</a>
            </li>

            <li class="part-title">技术文章</li>
            <li class="chapter-item {% if page.url contains '/notes/' %}active{% endif %}">
              <a href="{{ '/notes/' | relative_url }}"><span class="ch-icon">◈</span>所有文章</a>
            </li>
          </ol>
        </div>
      </nav>

      <main id="main-content">
        <div id="page-wrapper">
          <article class="page-inner">
            {{ content }}
          </article>
          <footer class="page-footer">
            <span>梁玥 · 学习笔记</span>
            <a href="https://github.com/cassieliang6709/study_notes" target="_blank" rel="noopener">GitHub</a>
          </footer>
        </div>
        <aside id="toc-rail" hidden>
          <p class="toc-label">本页目录</p>
          <nav id="toc-nav" aria-label="页面目录"></nav>
        </aside>
      </main>
    </div>

    <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
  </body>
</html>
